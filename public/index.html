<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <link rel="icon" href="/CartGoLogoCircle.png" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#09090b" />
  <meta name="description" content="CartGo | E-commerce Platform" />
  <title>CartGo | E-commerce Platform | Ganesh Gupta</title>
</head>

<body>

  <div id="root"></div>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      if (window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .then(reg => console.log('Service Worker registered!', reg))
            .catch(err => console.error('Service Worker registration failed:', err));
        });
      } else {
        // Automatically unregister service worker on localhost to avoid development caching issues
        navigator.serviceWorker.getRegistrations().then(registrations => {
          for (let registration of registrations) {
            registration.unregister().then(success => {
              if (success) {
                console.log('Unregistered active service worker from localhost');
                window.location.reload(); // Reload to fetch fresh webpack bundles
              }
            });
          }
        });
      }
    }
  </script>
</body>

</html>
